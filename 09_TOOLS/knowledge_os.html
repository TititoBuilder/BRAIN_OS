        return {domain:d, avg, mastered, total:dt.length, color:DC[d]};
      });

        const dt = topics.filter(t=>t.domain===d && t.last_touched);
        if (!dt.length) return {domain:d, heat:"cold", label:"never"};
        const latest = [...dt].sort((a,b)=>b.last_touched.localeCompare(a.last_touched))[0];
        const days = Math.floor((now - new Date(latest.last_touched))/86400000);
        return {domain:d, heat: days<=7?"hot":days<=30?"warm":"cold", label:`${days}d ago`};

                    <div style={{fontSize:10,color:'var(--gn)',marginTop:3,opacity:.8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>✓ {t.evidence}</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                    <span className="ort" style={{fontSize:15,fontWeight:700,color:SC[t.status]}}>{t.score}</span>
                    <Badge label={t.domain} color={DC[t.domain]} size={9} />
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ─── TOPIC ROW ─────────────────────────────────────────── */
    function TopicRow({t, onEdit, onQueue, inQueue}) {
      const sc = t.score>=80?'var(--gn)':t.score>=50?'var(--cy)':t.score>0?'var(--am)':'var(--t3)';
      const [hov, setHov] = useState(false);
      const [hovEdit, setHovEdit] = useState(false);
      const [hovQueue, setHovQueue] = useState(false);
      return (
        <div
          style={{display:'grid',gridTemplateColumns:'2fr 1.1fr 90px 80px 72px 100px 58px',gap:0,padding:'9px 16px',borderBottom:'1px solid var(--s3)',background:hov?'rgba(0,212,255,.025)':'transparent',transition:'background .1s'}}
          onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
          <div style={{paddingRight:12}}>
            <div style={{fontSize:12,color:'var(--t1)',fontWeight:500}}>{t.topic}</div>
            <div style={{fontSize:10,color:'var(--t2)',marginTop:2}}>{t.machine_key}</div>
            {t.evidence && <div style={{fontSize:10,color:'var(--gn)',marginTop:2,opacity:.75,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>✓ {t.evidence}</div>}
          </div>
          <div style={{display:'flex',alignItems:'center'}}><span style={{fontSize:10,color:DC[t.domain],fontWeight:600}}>{t.domain}</span></div>
          <div style={{display:'flex',alignItems:'center'}}><Badge label={t.status} color={SC[t.status]} /></div>
          <div style={{display:'flex',alignItems:'center'}}><Badge label={t.priority} color={PC[t.priority]} /></div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span className="ort" style={{fontSize:14,fontWeight:700,color:sc}}>{t.score}</span>
            <div style={{width:20,height:3,background:'var(--bd)',borderRadius:2,overflow:'hidden'}}>
              <div style={{width:`${t.score}%`,height:'100%',background:sc,borderRadius:2}}/>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center'}}>
            <span style={{fontSize:9,padding:'2px 7px',borderRadius:3,background:`${AC[t.audio_status]}1a`,color:AC[t.audio_status],fontWeight:600,letterSpacing:.4,whiteSpace:'nowrap'}}>
              {t.audio_status==="No Audio"?"⊘":t.audio_status==="Raw Audio Ready"?"▶":"✓"}{t.audio_duration>0?` ${Math.floor(t.audio_duration/60)}m`:""}
            </span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <button onClick={()=>onEdit(t)} title="Edit"
              onMouseEnter={()=>setHovEdit(true)} onMouseLeave={()=>setHovEdit(false)}
              style={{background:'var(--s2)',border:'1px solid var(--bd)',color:hovEdit?'#ffffff':'#aaaaaa',width:24,height:24,borderRadius:3,fontSize:13,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center',transition:'color .12s'}}>✎</button>
            <button onClick={()=>onQueue(t)} title={inQueue?"In queue":"Add to manifest"}
              onMouseEnter={()=>setHovQueue(true)} onMouseLeave={()=>setHovQueue(false)}
              style={{background:inQueue?'rgba(0,255,136,.1)':'var(--s2)',border:`1px solid ${inQueue?'var(--gn)':'var(--bd)'}`,color:inQueue?'#00ff88':hovQueue?'#ffffff':'#aaaaaa',width:24,height:24,borderRadius:3,fontSize:13,transition:'color .12s'}}>{inQueue?"✓":"+"}</button>
          </div>
        </div>
      );
    }

    /* ─── ENCYCLOPEDIA ──────────────────────────────────────── */
    function Encyclopedia({topics, onEdit, onQueue, queueIds}) {
      const [f, setF] = useState({domain:"",status:"",priority:"",audio:"",search:""});
      const upd = (k,v) => setF(p=>({...p,[k]:v}));

      const filtered = topics.filter(t=>{
        if (f.domain && t.domain!==f.domain) return false;
        if (f.status && t.status!==f.status) return false;
        if (f.priority && t.priority!==f.priority) return false;
        if (f.audio && t.audio_status!==f.audio) return false;
        if (f.search) {
          const q = f.search.toLowerCase();
          if (!t.topic.toLowerCase().includes(q) && !t.machine_key.includes(q) && !t.evidence.toLowerCase().includes(q)) return false;
        }
        return true;
      });

      const sel = {background:'var(--s2)',border:'1px solid var(--bd)',color:'var(--t1)',padding:'5px 8px',borderRadius:3,fontFamily:"'JetBrains Mono',monospace",fontSize:11};

      return (
        <div className="fade">
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:6,padding:12,flexWrap:'wrap'}}>
            <input placeholder="Search topic, key, evidence..." value={f.search} onChange={e=>upd('search',e.target.value)} style={{...sel,minWidth:220,flex:'1 1 220px'}}/>
            <select value={f.domain} onChange={e=>upd('domain',e.target.value)} style={sel}>
              <option value="">All Domains</option>
              {DOMAINS.map(o=><option key={o}>{o}</option>)}
            </select>
            <select value={f.status} onChange={e=>upd('status',e.target.value)} style={sel}>
              <option value="">All Status</option>
              {STATUS_LIST.map(o=><option key={o}>{o}</option>)}
            </select>
            <select value={f.priority} onChange={e=>upd('priority',e.target.value)} style={sel}>
              <option value="">All Priority</option>
              {PRIORITY_LIST.map(o=><option key={o}>{o}</option>)}
            </select>
            <select value={f.audio} onChange={e=>upd('audio',e.target.value)} style={sel}>
              <option value="">All Audio</option>
              {AUDIO_LIST.map(o=><option key={o}>{o}</option>)}
            </select>
            <button onClick={()=>setF({domain:"",status:"",priority:"",audio:"",search:""})} style={{...sel,color:'var(--t2)',cursor:'pointer'}}>Reset</button>
            <span style={{fontSize:10,color:'var(--t2)',marginLeft:'auto'}}>{filtered.length}/{topics.length}</span>
          </div>

          <div style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:6,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1.1fr 90px 80px 72px 100px 58px',gap:0,padding:'7px 16px',background:'var(--s2)',borderBottom:'1px solid var(--bd)'}}>
              {["Topic","Domain","Status","Priority","Score","Audio",""].map((h,i)=>(
                <div key={i} className="ort" style={{fontSize:9,color:'var(--t2)',letterSpacing:2}}>{h}</div>
              ))}
            </div>
            <div style={{maxHeight:'calc(100vh - 290px)',overflowY:'auto'}}>
              {filtered.map(t=><TopicRow key={t.id} t={t} onEdit={onEdit} onQueue={onQueue} inQueue={queueIds.includes(t.id)}/>)}
              {filtered.length===0 && <div style={{padding:40,textAlign:'center',color:'var(--t2)'}}>No topics match filters</div>}
            </div>
          </div>
        </div>
      );
    }

    /* ─── MANIFEST ──────────────────────────────────────────── */
    function Manifest({manifest, topics, onRemove, onMove, onExport, onQueue, onTransition}) {
      const totalSec = manifest.reduce((a,t)=>a+(t.audio_duration||0),0);
      const fmt = s => `${Math.floor(s/3600)}h ${String(Math.floor((s%3600)/60)).padStart(2,'0')}m`;
      const available = topics.filter(t=>!manifest.find(m=>m.id===t.id)&&t.audio_status!=="No Audio");

      return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:20}} className="fade">
          <div style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:6,overflow:'hidden'}}>
            <div style={{padding:'14px 20px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div className="ort" style={{fontSize:10,color:'var(--t2)',letterSpacing:3}}>MANIFEST QUEUE</div>
                <div style={{fontSize:12,color:'var(--cy)',marginTop:4}}>{fmt(totalSec)} total · {manifest.length} tracks</div>
              </div>
              <Btn onClick={onExport} accent disabled={manifest.length===0}>⬇ Export audio_manifest.json</Btn>
            </div>

            {manifest.length===0
              ? <div style={{padding:60,textAlign:'center',color:'var(--t2)',fontSize:12,lineHeight:2}}>
                  Add topics from Encyclopedia<br/>
                  <span style={{fontSize:10,opacity:.4}}>Click + on any row with audio</span>
                </div>
              : <>
                  {manifest.map((t,i)=>(
                    <div key={t.id} style={{padding:'12px 20px',borderBottom:'1px solid var(--s3)'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <span className="ort" style={{fontSize:11,color:'var(--t2)',minWidth:22}}>{String(i+1).padStart(2,'0')}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,color:'var(--t1)',fontWeight:600}}>{t.topic}</div>
                          <div style={{fontSize:10,color:DC[t.domain],marginTop:2}}>
                            {t.domain} · <span style={{color:AC[t.audio_status]}}>{t.audio_status}</span>
                            {t.audio_duration>0 && <span style={{color:'var(--t2)'}}> · {Math.floor(t.audio_duration/60)}m</span>}
                          </div>
                        </div>
                        <div style={{display:'flex',gap:3}}>
                          <button onClick={()=>onMove(i,-1)} disabled={i===0} style={{background:'var(--s2)',border:'1px solid var(--bd)',color:i===0?'var(--t3)':'var(--t1)',width:22,height:22,borderRadius:3,fontSize:12}}>↑</button>
                          <button onClick={()=>onMove(i,1)} disabled={i===manifest.length-1} style={{background:'var(--s2)',border:'1px solid var(--bd)',color:i===manifest.length-1?'var(--t3)':'var(--t1)',width:22,height:22,borderRadius:3,fontSize:12}}>↓</button>
                          <button onClick={()=>onRemove(t.id)} style={{background:'rgba(255,64,96,.1)',border:'1px solid rgba(255,64,96,.3)',color:'var(--rd)',width:22,height:22,borderRadius:3,fontSize:13}}>×</button>
                        </div>
                      </div>
                      <input
                        value={t.transition} onChange={e=>onTransition(t.id,e.target.value)}
                        placeholder="Transition narration for audio_stitcher.py..."
                        style={{width:'100%',marginTop:8,fontSize:11,color:'var(--t2)'}}
                      />
                    </div>
                  ))}
                  <div style={{padding:'12px 20px',background:'var(--s2)',borderTop:'1px solid var(--bd)',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,textAlign:'center'}}>
                    {[
                      {l:"Tracks",v:manifest.length,c:"var(--cy)"},
                      {l:"Total Time",v:fmt(totalSec),c:"var(--am)"},
                      {l:"Missing Audio",v:manifest.filter(t=>t.audio_status==="No Audio").length,c:"var(--rd)"},
                    ].map(s=>(
                      <div key={s.l}>
                        <div className="ort" style={{fontSize:16,fontWeight:700,color:s.c}}>{s.v}</div>
                        <div style={{fontSize:9,color:'var(--t2)',marginTop:2,letterSpacing:1}}>{s.l.toUpperCase()}</div>
                      </div>
                    ))}
                  </div>
                </>
            }
          </div>

          <div style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:6,overflow:'hidden'}}>
            <div style={{padding:'14px 16px',borderBottom:'1px solid var(--bd)'}}>
              <div className="ort" style={{fontSize:10,color:'var(--t2)',letterSpacing:3}}>AUDIO-READY TOPICS</div>
              <div style={{fontSize:10,color:'var(--t2)',marginTop:4}}>{available.length} available</div>
            </div>
            <div style={{maxHeight:580,overflowY:'auto'}}>
              {available.map(t=>(
                <div key={t.id} style={{padding:'9px 14px',borderBottom:'1px solid var(--s3)',display:'flex',alignItems:'center',gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,color:'var(--t1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.topic}</div>
                    <div style={{fontSize:10,marginTop:2,display:'flex',gap:6}}>
                      <span style={{color:DC[t.domain]}}>{t.domain}</span>
                      <span style={{color:AC[t.audio_status]}}>● {t.audio_status}</span>
                      {t.audio_duration>0&&<span style={{color:'var(--t2)'}}>{Math.floor(t.audio_duration/60)}m</span>}
                    </div>
                  </div>
                  <Btn onClick={()=>onQueue(t)} accent style={{padding:'3px 10px',fontSize:10}}>+</Btn>
                </div>
              ))}
              {available.length===0&&<div style={{padding:30,textAlign:'center',color:'var(--t2)',fontSize:11}}>All audio topics queued</div>}
            </div>
          </div>
        </div>
      );
    }

    /* ─── EDIT MODAL ────────────────────────────────────────── */
    function EditModal({topic, onSave, onClose}) {
      const [f, setF] = useState({...topic});
      const upd = (k,v) => setF(p=>({...p,[k]:v}));
      const inp = {width:'100%'};
      return (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={onClose}>
          <div style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:8,padding:28,width:560,maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()} className="fade">
            <div className="ort" style={{fontSize:12,color:'var(--cy)',letterSpacing:2,marginBottom:20}}>EDIT TOPIC — {topic.machine_key}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              {[
                {k:'topic',l:'Topic Name',t:'text',full:true},
                {k:'machine_key',l:'machine_key',t:'text'},
                {k:'domain',l:'Domain',t:'sel',opts:DOMAINS},
                {k:'status',l:'Status',t:'sel',opts:STATUS_LIST},
                {k:'priority',l:'Priority',t:'sel',opts:PRIORITY_LIST},
                {k:'audio_status',l:'Audio Status',t:'sel',opts:AUDIO_LIST},
              ].map(fi=>(
                <div key={fi.k} style={fi.full?{gridColumn:'1/-1'}:{}}>
                  <div style={{fontSize:9,color:'var(--t2)',letterSpacing:2,marginBottom:5}}>{fi.l.toUpperCase()}</div>
                  {fi.t==='sel'
                    ? <select value={f[fi.k]} onChange={e=>upd(fi.k,e.target.value)} style={inp}>
                        {fi.opts.map(o=><option key={o}>{o}</option>)}
                      </select>
                    : <input value={f[fi.k]} onChange={e=>upd(fi.k,e.target.value)} style={inp}/>
                  }
                </div>
              ))}
              <div>
                <div style={{fontSize:9,color:'var(--t2)',letterSpacing:2,marginBottom:5}}>SCORE — {f.score}</div>
                <input type="range" min="0" max="100" value={f.score} onChange={e=>upd('score',+e.target.value)} style={{width:'100%',accentColor:'var(--cy)'}}/>
              </div>
              <div>
                <div style={{fontSize:9,color:'var(--t2)',letterSpacing:2,marginBottom:5}}>AUDIO DURATION (secs)</div>
                <input type="number" value={f.audio_duration} onChange={e=>upd('audio_duration',+e.target.value)} style={inp}/>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <div style={{fontSize:9,color:'var(--t2)',letterSpacing:2,marginBottom:5}}>BUILD EVIDENCE</div>
              <textarea value={f.evidence} onChange={e=>upd('evidence',e.target.value)} rows={2} style={{...inp,resize:'vertical'}}/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>
              <Btn onClick={onClose}>Cancel</Btn>
              <Btn onClick={()=>onSave(f)} accent>Save Changes</Btn>
            </div>
          </div>
        </div>
      );
    }

    /* ─── ADD MODAL ─────────────────────────────────────────── */
    function AddModal({onSave, onClose}) {

      const upd = (k,v) => setF(p=>({...p,[k]:v}));
      return (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={onClose}>
          <div style={{background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:8,padding:28,width:500}} onClick={e=>e.stopPropagation()} className="fade">
            <div className="ort" style={{fontSize:12,color:'var(--gn)',letterSpacing:2,marginBottom:20}}>+ NEW TOPIC</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              {[
                {k:'topic',l:'Topic Name',t:'text',full:true},
                {k:'machine_key',l:'machine_key (snake_case)',t:'text',full:true},
                {k:'domain',l:'Domain',t:'sel',opts:DOMAINS},
                {k:'priority',l:'Priority',t:'sel',opts:PRIORITY_LIST},
              ].map(fi=>(
                <div key={fi.k} style={fi.full?{gridColumn:'1/-1'}:{}}>
                  <div style={{fontSize:9,color:'var(--t2)',letterSpacing:2,marginBottom:5}}>{fi.l.toUpperCase()}</div>
                  {fi.t==='sel'
                    ? <select value={f[fi.k]} onChange={e=>upd(fi.k,e.target.value)} style={{width:'100%'}}>
                        {fi.opts.map(o=><option key={o}>{o}</option>)}
                      </select>
                    : <input value={f[fi.k]} onChange={e=>upd(fi.k,e.target.value)} style={{width:'100%'}}/>
                  }
                </div>
              ))}
            </div>
            <div style={{marginTop:14}}>
              <div style={{fontSize:9,color:'var(--t2)',letterSpacing:2,marginBottom:5}}>INITIAL BUILD EVIDENCE (optional)</div>
              <input value={f.evidence} onChange={e=>upd('evidence',e.target.value)} placeholder="e.g. Used in BDF pipeline, C:\Dev\..." style={{width:'100%'}}/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>
              <Btn onClick={onClose}>Cancel</Btn>
              <Btn onClick={()=>{if(f.topic&&f.machine_key)onSave(f)}} accent style={{borderColor:'var(--gn)',color:'var(--gn)',background:'rgba(0,255,136,.08)'}}>Add Topic</Btn>
            </div>

    /* ─── ROOT ──────────────────────────────────────────────── */
    function App() {
      const [topics, setTopics] = useState([]);
      const [tab, setTab] = useState("dashboard");
      const [manifest, setManifest] = useState([]);
      const [editTopic, setEditTopic] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [ready, setReady] = useState(false);

      useEffect(()=>{
        const r = localStorage.getItem('kos_topics');
        setTopics(r ? JSON.parse(r) : mkTopics());
        const m = localStorage.getItem('kos_manifest');
        setManifest(m ? JSON.parse(m) : []);
        setReady(true);
      },[]);

      useEffect(()=>{ if(ready) localStorage.setItem('kos_topics', JSON.stringify(topics)); },[topics,ready]);
      useEffect(()=>{ if(ready) localStorage.setItem('kos_manifest', JSON.stringify(manifest)); },[manifest,ready]);

      const updateTopic = (id, upd) => setTopics(p=>p.map(t=>t.id===id?{...t,...upd,last_touched:new Date().toISOString().split('T')[0]}:t));
      const addToQueue = t => { if(!manifest.find(m=>m.id===t.id)) setManifest(p=>[...p,{...t,transition:`Next: ${t.topic}.`}]); };
      const removeFromQueue = id => setManifest(p=>p.filter(m=>m.id!==id));
      const moveQueue = (i,d) => { const n=[...manifest]; const s=i+d; if(s<0||s>=n.length)return; [n[i],n[s]]=[n[s],n[i]]; setManifest(n); };
      const updateTransition = (id,v) => setManifest(p=>p.map(m=>m.id===id?{...m,transition:v}:m));

      const exportManifest = () => {
        const total = manifest.reduce((a,t)=>a+(t.audio_duration||0),0);
        const data = {
          generated: new Date().toISOString(),
          phase: "Custom Learning Phase",
          total_duration_seconds: total,
          total_duration_human: `${Math.floor(total/3600)}h ${Math.floor((total%3600)/60)}m`,
          tracks: manifest.map(t=>({
            machine_key:t.machine_key, topic:t.topic, domain:t.domain,
            audio_status:t.audio_status, duration_seconds:t.audio_duration,
            transition:t.transition,
            file_hint:`Drive/${t.domain.replace(/\W+/g,'_')}/${t.machine_key}.wav`
          }))
        };
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
        a.download = 'audio_manifest.json';
        a.click();
      };

      if(!ready) return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--t2)'}}>
          <GS/><span className="ort" style={{letterSpacing:4,fontSize:11}}>INITIALIZING...</span>
        </div>
      );

      const tabs = [["dashboard","▣  DASHBOARD"],["encyclopedia","⊞  ENCYCLOPEDIA"],["manifest","⏵  MANIFEST BUILDER"]];

      return (
        <div style={{minHeight:'100vh',background:'var(--bg)'}}>
          <GS/>
          <header style={{background:'var(--s1)',borderBottom:'1px solid var(--bd)',padding:'0 24px',position:'sticky',top:0,zIndex:100}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0 8px'}}>
              <div>
                <div className="ort" style={{fontSize:17,fontWeight:900,color:'var(--cy)',letterSpacing:4}}>KNOWLEDGE OS</div>
                <div style={{fontSize:12,color:'#c8d8f8',letterSpacing:2,marginTop:2}}>CRISTIAN · COMPUTING ENCYCLOPEDIA · {topics.length} TOPICS LOADED</div>
              </div>
              <div style={{display:'flex',gap:20,alignItems:'center'}}>
                <div style={{textAlign:'right'}}>
                  <div className="ort" style={{fontSize:22,fontWeight:700,color:'var(--gn)'}}>{topics.filter(t=>t.status==="Mastered").length}</div>
                  <div style={{fontSize:10,color:'#c8d8f8',letterSpacing:2}}>MASTERED</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="ort" style={{fontSize:22,fontWeight:700,color:'var(--rd)'}}>{topics.filter(t=>t.priority==="High"&&t.status==="Not Started").length}</div>
                  <div style={{fontSize:10,color:'#c8d8f8',letterSpacing:2}}>HIGH GAPS</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="ort" style={{fontSize:22,fontWeight:700,color:'var(--cy)'}}>{manifest.length}</div>
                  <div style={{fontSize:10,color:'#c8d8f8',letterSpacing:2}}>QUEUED</div>
                </div>
                {tab==="encyclopedia" && <Btn onClick={()=>setShowAdd(true)} accent>+ New Topic</Btn>}
              </div>
            </div>
            <div style={{display:'flex',gap:0}}>
              {tabs.map(([id,label])=>(
                <div key={id} onClick={()=>setTab(id)} style={{padding:'8px 22px',cursor:'pointer',fontSize:10,letterSpacing:2,borderBottom:`2px solid ${tab===id?'var(--cy)':'transparent'}`,color:tab===id?'var(--cy)':'var(--t2)',transition:'all .15s',fontFamily:"'Orbitron',monospace"}}>{label}</div>
              ))}
            </div>
          </header>

          <main style={{padding:20}}>
            {tab==="dashboard" && <Dashboard topics={topics} onEdit={setEditTopic}/>}
            {tab==="encyclopedia" && <Encyclopedia topics={topics} onEdit={setEditTopic} onQueue={addToQueue} queueIds={manifest.map(m=>m.id)}/>}
            {tab==="manifest" && <Manifest manifest={manifest} topics={topics} onRemove={removeFromQueue} onMove={moveQueue} onExport={exportManifest} onQueue={addToQueue} onTransition={updateTransition}/>}
          </main>

          {editTopic && <EditModal topic={editTopic} onSave={u=>{updateTopic(editTopic.id,u);setEditTopic(null);}} onClose={()=>setEditTopic(null)}/>}
          {showAdd && <AddModal onSave={t=>{setTopics(p=>[...p,{...t,id:Date.now(),added:new Date().toISOString().split('T')[0],last_touched:new Date().toISOString().split('T')[0]}]);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
